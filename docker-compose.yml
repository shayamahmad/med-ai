
services:

  backend:
    build:
      context: ./backend
    container_name: medai-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: unless-stopped


  frontend:
    build:
      context: ./medai-frontend

    container_name: medai-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped